name: Scraper de Atléticas de Medicina

on:
  schedule:
    # Toda segunda-feira às 08h00 (horário de Brasília, UTC-3) = 11h00 UTC
    - cron: "0 11 * * 1"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install ddgs supabase

      - name: Rodar scraper e enviar para o Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python buscar_atleticas_medicina.py

      - name: Upload dos arquivos CSV/JSON gerados (debug/auditoria)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atleticas-encontradas
          path: |
            atleticas_encontradas.csv
            atleticas_encontradas.json
          retention-days: 30
          if-no-files-found: ignore
